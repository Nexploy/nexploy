name: nexploy_dev
services:
  postgres:
    image: postgres:18.0
    container_name: nexploy_postgres_dev
    ports:
      - "5433:5432"
    networks:
      - nexploy_network
    environment:
      - POSTGRES_DB=nexploy
      - POSTGRES_USER=nexploy
      - POSTGRES_PASSWORD=nexploy
    volumes:
      - nexploy_db:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $POSTGRES_USER" ]
      interval: 60s
      timeout: 5s
      retries: 5

  inngest:
    image: inngest/inngest:latest
    container_name: nexploy_inngest_dev
    ports:
      - "8288:8288"
    networks:
      - nexploy_network
    environment:
      - INNGEST_EVENT_KEY=local-dev-key
      - INNGEST_SIGNING_KEY=signkey-test-12345678
    command: inngest dev -u http://host.docker.internal:3000/api/inngest
    extra_hosts:
      - "host.docker.internal:host-gateway"

  traefik:
    image: traefik:v3.2
    container_name: nexploy_traefik_dev
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"

      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=nexploy_network"

      - "--entrypoints.web.address=:80"

      - "--log.level=DEBUG"
      - "--accesslog=true"
      - "--accesslog.format=json"

      - "--ping=true"
    ports:
      - "80:80"
      - "8080:8080"

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

    networks:
      - nexploy_network

    labels:
      - "traefik.enable=true"

    healthcheck:
      test: [ "CMD", "traefik", "healthcheck", "--ping" ]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  nexploy_db:

networks:
  nexploy_network:
    driver: bridge
