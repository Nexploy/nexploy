name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  images:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: nexploy
            dockerfile: apps/nexploy/Dockerfile
          - image: docker-api
            dockerfile: apps/docker-api/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: nexploy/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  release:
    name: GitHub release
    needs: images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tags
        id: tags
        env:
          GIT_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          echo "git=${GIT_TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${GIT_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tags.outputs.git }}
          generate_release_notes: true
          body: |
            ## Docker images

            ```
            docker pull nexploy/nexploy:${{ steps.tags.outputs.image }}
            docker pull nexploy/docker-api:${{ steps.tags.outputs.image }}
            ```

            ## Install

            ```bash
            curl -fsSL https://nexploy.app/install.sh | sh
            ```

            Or pin this exact version:

            ```bash
            NEXPLOY_VERSION=${{ steps.tags.outputs.git }} \
              sh -c "$(curl -fsSL https://nexploy.app/install.sh)"
            ```

            Already running Nexploy?

            ```bash
            curl -fsSL https://nexploy.app/install.sh | sh -s update
            ```
