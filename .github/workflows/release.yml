name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.image }} (${{ matrix.platform }})
    runs-on: ${{ matrix.platform == 'linux/amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    strategy:
      fail-fast: false
      matrix:
        image:
          - nexploy
          - docker-api
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - image: nexploy
            dockerfile: apps/nexploy/Dockerfile
          - image: docker-api
            dockerfile: apps/docker-api/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare platform tag
        id: platform
        run: echo "pair=${platform//\//-}" >> "$GITHUB_OUTPUT"
        env:
          platform: ${{ matrix.platform }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=nexploy/${{ matrix.image }},push-by-digest=true,name-canonical=true
          cache-from: type=gha,scope=${{ matrix.image }}-${{ steps.platform.outputs.pair }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ steps.platform.outputs.pair }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests/${{ matrix.image }}
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${{ matrix.image }}/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.image }}-${{ steps.platform.outputs.pair }}
          path: /tmp/digests/${{ matrix.image }}/*
          if-no-files-found: error
          retention-days: 1

  images:
    name: Publish ${{ matrix.image }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: nexploy
            readme: apps/nexploy/DOCKERHUB.md
          - image: docker-api
            readme: apps/docker-api/DOCKERHUB.md
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests/${{ matrix.image }}
          pattern: digests-${{ matrix.image }}-*
          merge-multiple: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: nexploy/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Create manifest list and push
        working-directory: /tmp/digests/${{ matrix.image }}
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'nexploy/${{ matrix.image }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect nexploy/${{ matrix.image }}:${{ steps.meta.outputs.version }}

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: nexploy/${{ matrix.image }}
          readme-filepath: ${{ matrix.readme }}

  release:
    name: GitHub release
    needs: images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tags
        id: tags
        env:
          GIT_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          echo "git=${GIT_TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${GIT_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tags.outputs.git }}
          generate_release_notes: true
          body: |
            ## Docker images

            ```
            docker pull nexploy/nexploy:${{ steps.tags.outputs.image }}
            docker pull nexploy/docker-api:${{ steps.tags.outputs.image }}
            ```

            ## Install

            ```bash
            curl -fsSL https://nexploy.app/install.sh | sh
            ```

            Or pin this exact version:

            ```bash
            NEXPLOY_VERSION=${{ steps.tags.outputs.git }} \
              sh -c "$(curl -fsSL https://nexploy.app/install.sh)"
            ```

            Already running Nexploy?

            ```bash
            curl -fsSL https://nexploy.app/install.sh | sh -s update
            ```
