name: nexploy_dev
services:
  postgres:
    image: postgres:18.0
    container_name: nexploy_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    networks:
      - nexploy_network
    environment:
      - POSTGRES_DB=nexploy
      - POSTGRES_USER=nexploy
      - POSTGRES_PASSWORD=nexploy
    volumes:
      - db:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $POSTGRES_USER" ]
      interval: 60s
      timeout: 5s
      retries: 5

  inngest:
    image: inngest/inngest:v1.14.0
    container_name: nexploy_inngest
    restart: unless-stopped
    ports:
      - "8288:8288"
    networks:
      - nexploy_network
    environment:
      - INNGEST_EVENT_KEY=local-dev-key
      - INNGEST_SIGNING_KEY=signkey-test-12345678
    command: inngest dev -u http://host.docker.internal:3000/api/inngest
    extra_hosts:
      - "host.docker.internal:host-gateway"

  traefik:
    image: traefik:v3.6.2
    container_name: nexploy_traefik
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../traefik/traefik.dev.yml:/etc/traefik/traefik.yml
      - ../traefik/service:/etc/nexploy/traefik/service
    ports:
      - "80:80"
      - "8080:8080"
    networks:
      - nexploy_network
    labels:
      - "traefik.enable=true"
    healthcheck:
      test: [ "CMD", "traefik", "healthcheck", "--ping" ]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  db:

networks:
  nexploy_network:
    name: nexploy_network
    driver: bridge
