# Usage:
#   docker compose -f infra/docker/docker-compose.pre-release.yml --env-file .env.production up -d
# =============================================================================
name: nexploy_release
services:
  postgres:
    image: postgres:18.0
    container_name: nexploy_postgres_release
    restart: unless-stopped
    ports:
      - "4522:5432"
    networks:
      - nexploy_network_release
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexploy}
      POSTGRES_USER: ${POSTGRES_USER:-nexploy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - db:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexploy}" ]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

  inngest:
    image: inngest/inngest:v1.14.0
    container_name: nexploy_inngest_release
    restart: unless-stopped
    networks:
      - nexploy_network_release
    environment:
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY:?INNGEST_EVENT_KEY is required}
      INNGEST_SIGNING_KEY: ${INNGEST_SIGNING_KEY:?INNGEST_SIGNING_KEY is required}
    command: inngest start -u http://nexploy:3000/api/inngest
    depends_on:
      nexploy:
        condition: service_healthy

  traefik:
    image: traefik:v3.6.2
    container_name: nexploy_traefik_release
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../traefik/traefik.pre-prod.yml:/etc/traefik/traefik.yml:ro
      - ../traefik/service:/etc/traefik/dynamic
      - traefik_acme:/etc/traefik
    ports:
      - "80:80"
      - "443:443"
    networks:
      - nexploy_network_release
      - nexploy_traefik_network_release
    healthcheck:
      test: [ "CMD", "traefik", "healthcheck", "--ping" ]
      interval: 10s
      timeout: 3s
      retries: 3

  nexploy:
    image: ${NEXPLOY_IMAGE:-nexploy-app:cmqpsfac50000y9ynmvpec7fw}
    container_name: nexploy_app_release
    restart: unless-stopped
    networks:
      - nexploy_network_release
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-nexploy}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nexploy}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?BETTER_AUTH_URL is required}
      NEXPLOY_URL: ${NEXPLOY_URL:-${BETTER_AUTH_URL}}
      DOCKER_API_URL: http://docker-api:3300
      DOCKER_API_KEY: ${NEXPLOY_API_KEY:?NEXPLOY_API_KEY is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      DEPLOYER_WORK_DIR: /tmp/deployer
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY}
      INNGEST_SIGNING_KEY: ${INNGEST_SIGNING_KEY}
      INNGEST_BASE_URL: http://inngest:8288
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-}
    volumes:
      - deployer_workdir:/tmp/deployer
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://0.0.0.0:3000 || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
    ports:
      - "4521:3000"

  docker-api:
    image: ${DOCKER_API_IMAGE:-nexploy-docker-api:cmqprmpip0001ozynigb1h2dw}
    container_name: nexploy_docker_api_release
    restart: unless-stopped
    networks:
      - nexploy_network_release
      - nexploy_traefik_network_release
    environment:
      NODE_ENV: production
      PORT: 3300
      DOCKER_SOCKET: /var/run/docker.sock
      NEXPLOY_API_URL: http://nexploy:3000
      NEXPLOY_API_KEY: ${NEXPLOY_API_KEY:?NEXPLOY_API_KEY is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TRAEFIK_CONTAINER_NAME: nexploy_traefik_release
      TRAEFIK_NETWORK_NAME: nexploy_traefik_network_release
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - deployer_workdir:/tmp/deployer
    depends_on:
      nexploy:
        condition: service_healthy
    expose:
      - "3300"

volumes:
  db:
  traefik_acme:
  deployer_workdir:

networks:
  nexploy_network_release:
    name: nexploy_network_release
    driver: bridge
  nexploy_traefik_network_release:
    name: nexploy_traefik_network_release
    driver: bridge
