http:
  middlewares:
    upgrading:
      plugin:
        staticresponse:
          statusCode: 503
          headers:
            Content-Type:
              - text/html; charset=utf-8
            Cache-Control:
              - no-store
          body: |
            <!DOCTYPE html>
            <html lang="en">
            <head>
                <meta charset="UTF-8" />
                <meta http-equiv="refresh" content="5" />
                <meta name="viewport" content="width=device-width, initial-scale=1.0" />
                <meta name="robots" content="noindex, nofollow" />
                <title>Nexploy is updating…</title>
                <style>
                    /* Exact Nexploy theme tokens (packages/ui/src/styles/globals.css) */
                    :root {
                        --bg: oklch(1 0 0);
                        --fg: oklch(0.145 0 0);
                        --muted: oklch(0.556 0 0);
                        --border: oklch(0.922 0 0);
                        --card: oklch(1 0 0);
                        --primary: oklch(0.5465 0.2455 262.8657);
                        --primary-soft: oklch(0.5465 0.2455 262.8657 / 0.1);
                        --primary-ring: oklch(0.5465 0.2455 262.8657 / 0.22);
                        --radius: 0.625rem;
                        --radius-card: 1rem;
                        --shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 12px 32px -12px rgba(24, 24, 27, 0.12);
                    }

                    * { margin: 0; padding: 0; box-sizing: border-box; }
                    html, body { height: 100%; }

                    body {
                        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
                        background:
                            radial-gradient(60rem 60rem at 50% -20%, var(--primary-soft), transparent 60%),
                            var(--bg);
                        color: var(--fg);
                        min-height: 100%;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        padding: 24px;
                        -webkit-font-smoothing: antialiased;
                    }

                    /* Centered upgrading card */
                    .card {
                        width: 100%;
                        max-width: 440px;
                        background: var(--card);
                        border: 1px solid var(--border);
                        border-radius: var(--radius-card);
                        box-shadow: var(--shadow);
                        padding: 40px 36px;
                        text-align: center;
                        animation: fade-in 0.5s ease-out both;
                    }
                    .icon {
                        width: 56px;
                        height: 56px;
                        margin: 0 auto 24px;
                        border-radius: var(--radius);
                        background: var(--primary-soft);
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        color: var(--primary);
                    }
                    .icon svg {
                        width: 28px;
                        height: 28px;
                        animation: spin 1.4s linear infinite;
                        transform-origin: center;
                    }
                    h1 {
                        font-size: 1.35rem;
                        font-weight: 650;
                        letter-spacing: -0.02em;
                        margin-bottom: 12px;
                        line-height: 1.3;
                    }
                    p { font-size: 0.95rem; line-height: 1.6; color: var(--muted); }
                    p + p { margin-top: 4px; }

                    .divider {
                        height: 1px;
                        background: var(--border);
                        margin: 28px 0 18px;
                    }
                    .footer {
                        font-size: 0.75rem;
                        letter-spacing: 0.04em;
                        color: var(--muted);
                    }
                    .footer strong { color: var(--primary); font-weight: 600; }

                    @keyframes fade-in {
                        from { opacity: 0; transform: translateY(10px); }
                        to { opacity: 1; transform: translateY(0); }
                    }
                    @keyframes spin {
                        from { transform: rotate(0deg); }
                        to { transform: rotate(360deg); }
                    }
                </style>
            </head>
            <body>
                <div class="card">
                    <div class="icon" aria-hidden="true">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-rotate-cw-icon lucide-rotate-cw"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
                    </div>
                    <h1>Nexploy is being updated</h1>
                    <p>We're applying an update and will be back in just a moment.</p>
                    <p>This page will refresh automatically.</p>
                    <div class="divider"></div>
                    <div class="footer">Powered by <strong>Nexploy</strong></div>
                </div>
            </body>
            </html>
