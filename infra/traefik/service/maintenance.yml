http:
  middlewares:
    maintenance:
      plugin:
        staticresponse:
          statusCode: 503
          headers:
            Content-Type:
              - text/html; charset=utf-8
            Cache-Control:
              - no-store
          body: |
            <!DOCTYPE html>
            <html lang="en">
            <head>
                <meta charset="UTF-8" />
                <meta name="viewport" content="width=device-width, initial-scale=1.0" />
                <meta name="robots" content="noindex, nofollow" />
                <title>Site under maintenance — Nexploy</title>
                <style>
                    /* Exact Nexploy theme tokens (packages/ui/src/styles/globals.css) */
                    :root {
                        --bg: oklch(1 0 0);
                        --fg: oklch(0.145 0 0);
                        --muted: oklch(0.556 0 0);
                        --border: oklch(0.922 0 0);
                        --card: oklch(1 0 0);
                        --primary: oklch(0.5465 0.2455 262.8657);
                        --primary-soft: oklch(0.5465 0.2455 262.8657 / 0.1);
                        --primary-ring: oklch(0.5465 0.2455 262.8657 / 0.22);
                        --radius: 0.625rem;
                        --radius-card: 1rem;
                        --shadow: 0 1px 2px rgba(0, 0, 0, 0.04), 0 12px 32px -12px rgba(24, 24, 27, 0.12);
                    }

                    * { margin: 0; padding: 0; box-sizing: border-box; }
                    html, body { height: 100%; }

                    body {
                        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
                        background:
                            radial-gradient(60rem 60rem at 50% -20%, var(--primary-soft), transparent 60%),
                            var(--bg);
                        color: var(--fg);
                        min-height: 100%;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        padding: 24px;
                        -webkit-font-smoothing: antialiased;
                    }

                    /* Brand block — same arrangement as the Nexploy sidebar header */
                    .brand {
                        position: fixed;
                        top: 22px;
                        left: 26px;
                        display: flex;
                        align-items: center;
                        gap: 8px;
                    }
                    .brand .logo {
                        width: 28px;
                        height: 28px;
                        flex-shrink: 0;
                        color: var(--fg);
                    }
                    .brand .logo svg { width: 100%; height: 100%; display: block; }
                    .brand .name { display: flex; flex-direction: column; line-height: 1; }
                    .brand .name strong { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }
                    .brand .name span { font-size: 12px; color: var(--muted); margin-top: 3px; }

                    /* Centered maintenance card */
                    .card {
                        width: 100%;
                        max-width: 440px;
                        background: var(--card);
                        border: 1px solid var(--border);
                        border-radius: var(--radius-card);
                        box-shadow: var(--shadow);
                        padding: 40px 36px;
                        text-align: center;
                        animation: fade-in 0.5s ease-out both;
                    }
                    .icon {
                        width: 56px;
                        height: 56px;
                        margin: 0 auto 24px;
                        border-radius: var(--radius);
                        background: var(--primary-soft);
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        color: var(--primary);
                    }
                    .icon svg { width: 28px; height: 28px; }
                    h1 {
                        font-size: 1.35rem;
                        font-weight: 650;
                        letter-spacing: -0.02em;
                        margin-bottom: 12px;
                        line-height: 1.3;
                    }
                    p { font-size: 0.95rem; line-height: 1.6; color: var(--muted); }
                    p + p { margin-top: 4px; }

                    .divider {
                        height: 1px;
                        background: var(--border);
                        margin: 28px 0 18px;
                    }
                    .footer {
                        font-size: 0.75rem;
                        letter-spacing: 0.04em;
                        color: var(--muted);
                    }
                    .footer strong { color: var(--primary); font-weight: 600; }

                    @keyframes fade-in {
                        from { opacity: 0; transform: translateY(10px); }
                        to { opacity: 1; transform: translateY(0); }
                    }
                </style>
            </head>
            <body>
                <div class="brand">
                    <span class="logo" aria-hidden="true">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 487.17 534.98" fill="currentColor">
                            <path d="M238.51.17c7.92-.91,23.2,1.96,30.01,5.79,24.03,13.5,49.22,28.39,72.96,42.22l75.35,43.86,25.33,14.73c8.74,5.11,17.38,9.7,24.8,16.7,12.33,11.49,19.55,27.43,20.04,44.28.4,12.97.01,27.9,0,41,.11,32.11-.05,64.22-.47,96.32l-.22,53.11c-.04,8.56.05,17.48-.34,26.03-.1,2.24-1.75,5.09-3.39,6.62-7.3,6.84-16.65,9.79-26.37,9.98-9.51.05-20.29-3.13-28.3-8.14-7.45-4.66-13.9-11.1-20.03-17.19-8-7.95-15.92-15.91-23.88-23.88l-67.24-67.27-64.51-64.5c-21.09-21.08-39.31-40.14-62.74-58.96-29.26-23.5-61.9-36.39-99.92-32.39C55.46,132.06,21.32,151.54.02,178.41c-.34-19.66,3.69-35.85,16.54-51.09,12.12-14.38,34-24.93,50.37-34.46l68.51-39.9,51.65-30.17C204.73,12.39,217.54,2.22,238.51.17Z" />
                            <path d="M98.69,193.66c31.29-2.02,49.47,15.92,69.75,36.18l25.79,25.8,99.78,99.71,43.63,43.53c37.94,37.82,75.42,81.09,135.18,59.91-1.91,2.63-3.94,5.35-6.09,7.78-2.92,3.31-6.24,6.25-9.87,8.76-12.45,8.58-33.19,20.13-46.59,28.13l-31.65,18.82c-5.99,3.56-11.95,7.17-18.03,10.57-5.06,2.83-8.48,3.12-12.95-.88-6.78-6.06-13.12-12.71-19.6-19.11l-39.96-39.46-101.31-100.38-29.8-29.55c-4.2-4.16-11.63-12.05-15.92-15.34-6.16-1.32-7.01,4.36-7.01,8.94-.01,9.32-.03,18.66-.04,27.98l-.05,92.28c0,14.88.15,29.75.06,44.63-.05,8.2-4.9,12.66-12.83,8.37-8.52-4.62-16.83-9.62-25.18-14.54-8.47-4.95-16.88-9.99-25.24-15.13-6.13-3.74-12.21-7.17-17.78-11.76-11.96-9.71-19.42-23.9-20.64-39.26-.64-7.41-.28-19.52-.27-27.22,0-17.71.08-35.42.27-53.13l.07-54.86c.02-28.25-2.07-53.36,18.1-76.21,13.44-15.24,27.89-22.83,48.16-24.57Z" />
                        </svg>
                    </span>
                    <span class="name">
                        <strong>Nexploy</strong>
                    </span>
                </div>

                <div class="card">
                    <div class="icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                        </svg>
                    </div>
                    <h1>This site is under maintenance or no longer exists</h1>
                    <p>This site is temporarily unavailable or is no longer deployed.</p>
                    <p>Please try again later.</p>
                    <div class="divider"></div>
                    <div class="footer">Powered by <strong>Nexploy</strong></div>
                </div>
            </body>
            </html>
